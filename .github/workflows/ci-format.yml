name: "format"

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
        
    - name: Run format.sh
      run: ./format.sh

    - name: Check formatting diff
      run: |
        CHANGED_FILES="$(git diff-index --name-only HEAD --)"
        if [[ -z "${CHANGED_FILES}" ]]; then
          echo "Success: no formatting changes needed."
          exit 0
        fi
        echo "Found formatting changes in the following files:"
        echo "${CHANGED_FILES}"
        echo ""
        echo "Please run format.sh to apply the changes."
        exit 1
  verify-licenses:
    runs-on: ubuntu-latest
    name: Validate that all files have copyright and license info
    steps:
      - uses: actions/checkout@v6
      - name: Install REUSE
        run: |
          sudo apt-get install -y curl
          curl -LsSf https://astral.sh/uv/0.6.12/install.sh | sh
          export PATH="${PATH}:${HOME}/.local/bin" && uv venv && uv tool update-shell
          uv pip install reuse
      - name: Validate presence of copyright and license info (python w/reuse)
        run: |
          uv run reuse lint
